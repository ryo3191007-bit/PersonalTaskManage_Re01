<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>未実装のテストケース</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --text: #202124;
      --muted: #666b73;
      --border: #d9ddd6;
      --accent: #0f766e;
      --danger: #b42318;
      --warn: #b7791f;
      --ok: #16794c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Meiryo", sans-serif;
      line-height: 1.65;
    }
    header, main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      padding-top: 32px;
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0 0 8px; font-size: 32px; }
    h2 { margin-top: 32px; font-size: 24px; border-left: 5px solid var(--accent); padding-left: 10px; }
    h3 { margin-top: 24px; font-size: 18px; }
    p { margin: 8px 0; }
    a { color: #075985; }
    code {
      background: #eef2f0;
      border: 1px solid #d7ddda;
      border-radius: 4px;
      padding: 1px 4px;
      font-family: Consolas, monospace;
    }
    pre {
      overflow: auto;
      background: #111827;
      color: #f9fafb;
      border-radius: 8px;
      padding: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 16px 0;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .metric .label { color: var(--muted); font-size: 13px; }
    .metric .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      margin: 12px 0;
    }
    table { width: 100%; border-collapse: collapse; min-width: 720px; }
    th, td { border-bottom: 1px solid var(--border); padding: 8px 10px; text-align: left; vertical-align: top; }
    th { background: #eef2f0; white-space: nowrap; }
    tr:last-child td { border-bottom: 0; }
    .pill { display: inline-block; border-radius: 999px; padding: 2px 8px; font-weight: 700; font-size: 12px; }
    .pass { color: var(--ok); }
    .fail { color: var(--danger); }
    .na { color: var(--warn); }
  </style>
</head>
<body>

<header>
  <h1>未実装のテストケース</h1>
  <p>件数: <strong>0</strong></p>
  <p><a href="../index.html">テスト実行レポートへ戻る</a></p>
</header>
<main>
  <p>対象はありません。</p>
</main>

</body>
</html>
